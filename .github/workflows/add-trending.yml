name: Add Trending Cards
on:
  workflow_dispatch:

jobs:
  add-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Execute SQL
        run: |
          # マイグレーション実行（冪等）
          echo "🔧 Running migrations..."
          npx wrangler d1 execute koreka-db --remote --file=src/db/add-expires-at.sql || true
          # トレンドカード投入
          for f in src/db/trending-*.sql; do
            echo "📦 Executing $f..."
            npx wrangler d1 execute koreka-db --remote --file="$f"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
